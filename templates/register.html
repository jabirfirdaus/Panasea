{% extends 'layout.html' %}

{% block title %}Daftar - Panasea{% endblock %}

{% block content %}
<section class="py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-sm border-0" style="border-radius: 18px;">
                    <div class="card-body p-5">

                        <h3 class="fw-bold text-center mb-4">
                            <i class="bi bi-person-plus text-success"></i> Daftar Akun
                        </h3>

                        <form method="POST">
                            <div class="mb-3">
                                <label for="username" class="form-label">Username</label>
                                <input type="text" class="form-control" id="username"
                                       name="username" placeholder="Masukkan username" required>
                            </div>

                            <div class="mb-3">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" class="form-control" id="email"
                                       name="email" placeholder="Masukkan email" required>
                            </div>

                            <div class="mb-3">
                                <label for="password" class="form-label">Password</label>
                                <input type="password" class="form-control" id="password"
                                       name="password" placeholder="Minimal 6 karakter" required>
                            </div>

                            <div class="mb-3">
                                <label for="confirm_password" class="form-label">Konfirmasi Password</label>
                                <input type="password" class="form-control" id="confirm_password"
                                       name="confirm_password" placeholder="Ulangi password" required>
                            </div>

                            <button type="submit" class="btn btn-success w-100">
                                Daftar
                            </button>
                        </form>

                        <p class="text-center mt-3 mb-0">
                            Sudah punya akun?
                            <a href="{{ url_for('auth.login') }}" class="text-success">Login di sini</a>
                        </p>

                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
