{% extends 'layout.html' %}

{% block title %}Tambah Obat - Panasea{% endblock %}

{% block content %}
<section class="py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6">

                <a href="{{ url_for('admin.dashboard') }}" class="text-success mb-3 d-inline-block">
                    <i class="bi bi-arrow-left"></i> Kembali ke Dashboard
                </a>

                <div class="card shadow-sm border-0" style="border-radius: 18px;">
                    <div class="card-body p-5">

                        <h3 class="fw-bold mb-4">
                            <i class="bi bi-plus-circle text-success"></i> Tambah Obat
                        </h3>

                        <form method="POST">
                            <div class="mb-3">
                                <label for="nama" class="form-label">Nama Obat</label>
                                <input type="text" class="form-control" id="nama"
                                       name="nama" placeholder="Contoh: Paracetamol" required>
                            </div>

                            <div class="mb-3">
                                <label for="harga" class="form-label">Harga (Rp)</label>
                                <input type="number" class="form-control" id="harga"
                                       name="harga" placeholder="10000" min="0" required>
                            </div>

                            <div class="mb-3">
                                <label for="deskripsi" class="form-label">Deskripsi</label>
                                <textarea class="form-control" id="deskripsi"
                                          name="deskripsi" rows="3" placeholder="Deskripsi obat..."></textarea>
                            </div>

                            <div class="mb-3">
                                <label for="aturan" class="form-label">Aturan Pakai</label>
                                <input type="text" class="form-control" id="aturan"
                                       name="aturan" placeholder="Contoh: 3x sehari setelah makan">
                            </div>

                            <button type="submit" class="btn btn-success w-100">
                                <i class="bi bi-check-lg"></i> Simpan Obat
                            </button>
                        </form>

                    </div>
                </div>

            </div>
        </div>
    </div>
</section>
{% endblock %}
