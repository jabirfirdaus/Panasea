{% extends 'layout.html' %}

{% block title %}Login - Panasea{% endblock %}

{% block content %}
<section class="py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-sm border-0" style="border-radius: 18px;">
                    <div class="card-body p-5">

                        <h3 class="fw-bold text-center mb-4">
                            <i class="bi bi-box-arrow-in-right text-success"></i> Login
                        </h3>

                        <form method="POST">
                            <div class="mb-3">
                                <label for="username" class="form-label">Username</label>
                                <input type="text" class="form-control" id="username"
                                       name="username" placeholder="Masukkan username" required>
                            </div>

                            <div class="mb-3">
                                <label for="password" class="form-label">Password</label>
                                <input type="password" class="form-control" id="password"
                                       name="password" placeholder="Masukkan password" required>
                            </div>

                            <button type="submit" class="btn btn-success w-100">
                                Login
                            </button>
                        </form>

                        <p class="text-center mt-3 mb-0">
                            Belum punya akun?
                            <a href="{{ url_for('auth.register') }}" class="text-success">Daftar di sini</a>
                        </p>

                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
